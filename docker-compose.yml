version: "3.8"

services:
  # ── MongoDB ────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: eventiq-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - eventiq-net

  # ── Redis (distributed seat locking with TTL) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventiq-net

  # ── Node.js Backend ────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: eventiq-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongo:27017/eventbooking
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET:-Dev@tarun}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml-service:8000
      - ML_API_KEY=${ML_API_KEY:-}
      - FRONTEND_URL=http://localhost:5173
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - eventiq-net

  # ── React Frontend (nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: /api/
    container_name: eventiq-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eventiq-net

  # ── FastAPI ML Recommendation Service ──────────────────────────────
  ml-service:
    build: ./ml-service
    container_name: eventiq-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/eventbooking
      - DB_NAME=eventbooking
      - MODEL_PATH=/app/model.pkl
      - ML_API_KEY=${ML_API_KEY:-}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - eventiq-net

volumes:
  mongo-data:

networks:
  eventiq-net:
    driver: bridge
